/* ===== DATA FUNCTIONS ===== */
function extractAgeRange(cat){if(!cat)return null;var c=cat.replace(/\s+/g," ").trim();var m=c.match(/(\d+)\s*[&]?\s*Under/i);if(m)return{min:5,max:parseInt(m[1])};m=c.match(/(\d+)\s*-\s*(\d+)/);if(m)return{min:parseInt(m[1]),max:parseInt(m[2])};m=c.match(/\b(\d{1,2})\b/);if(m){var a=parseInt(m[1]);if(a>=5&&a<=18)return{min:a,max:a};}return null;}
function extractGender(cat){if(!cat)return"?";if(/Girls/i.test(cat))return"F";if(/Boys/i.test(cat))return"M";return"?";}
function estimateBirth(apps){var e=[];for(var i=0;i<apps.length;i++){var a=apps[i];var r=extractAgeRange(a.category);if(r&&a.year){e.push(a.year-r.max);e.push(a.year-r.min);}}if(!e.length)return null;return Math.round(e.reduce(function(a,b){return a+b;},0)/e.length);}
function canMerge(person,app){if(person.gender!=="?"&&app.gender!=="?"&&person.gender!==app.gender)return false;for(var i=0;i<person.appearances.length;i++){if(person.appearances[i].tournKey===app.tournKey&&person.appearances[i].category!==app.category)return false;}var appRange=extractAgeRange(app.category);if(appRange){for(var j=0;j<person.appearances.length;j++){var prev=person.appearances[j];var prevRange=extractAgeRange(prev.category);if(!prevRange)continue;var yd=app.year-prev.year;if(yd>0){if(appRange.max<prevRange.min-1)return false;if(appRange.min>prevRange.max+yd+1)return false;}else if(yd<0){if(prevRange.max<appRange.min-1)return false;if(prevRange.min>appRange.max+Math.abs(yd)+1)return false;}else{if(appRange.min>prevRange.max+1||appRange.max<prevRange.min-1)return false;}var pBmin=prev.year-prevRange.max,pBmax=prev.year-prevRange.min;var aBmin=app.year-appRange.max,aBmax=app.year-appRange.min;if(aBmin>pBmax+1||aBmax<pBmin-1)return false;}}return true;}
function calcPar(hpr,n){return hpr*((hpr&&hpr<=9)?3:4)*n;}
function dateSort(d){if(!d)return"";if(/^\d{4}-/.test(d))return d;var m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return m[3]+"-"+("0"+m[1]).slice(-2)+"-"+("0"+m[2]).slice(-2);return d;}

function adaptFormat(raw){
  if(raw&&raw.tournaments&&raw.tournaments.length>0&&raw.tournaments[0].flights&&!Array.isArray(raw.tournaments[0].flights))return raw;
  var arr=Array.isArray(raw)?raw:(raw&&raw.tournaments?raw.tournaments:[]);
  if(!arr.length)return{tournaments:[]};
  return{tournaments:arr.map(function(t){
    if(!t||!t.name)return null;
    var flights={},fc={};
    (t.flights||[]).forEach(function(f){var fid=f.flight_id||f.id||Math.random().toString(36);flights[fid]=f.data||{};fc[fid]=f.flight_name||"Unknown";});
    var meta=t.meta||{},tm=meta.tournament||{};
    var sd=tm.start_date||t.date||"";var ym=sd.match&&sd.match(/(\d{4})/);
    var year=t.year||(ym?parseInt(ym[1]):null);
    if(!year){var nm=t.name.match&&t.name.match(/(20\d{2}|199\d)/);if(nm)year=parseInt(nm[1]);}
    return{name:t.name,year:year,tournament_id:t.tournament_id||null,signupanytime_t:t.signupanytime_t||null,iframe_url:t.iframe_url||null,date:t.date||null,category:t.category||null,flights:flights,flight_categories:fc,meta:meta};
  }).filter(Boolean)};
}

function shortCourse(coursesStr){
  if(!coursesStr)return"";
  var parts=coursesStr.split(",").map(function(s){return s.trim();}).filter(Boolean);
  if(parts.length<=2)return parts.join(", ");
  return parts[0]+", "+parts[1]+" (+"+(parts.length-2)+")";
}

function processData(raw){
  console.time("processData");

    if(!coursesStr&&meta.courses&&typeof meta.courses==="object"){var cn=[];Object.values(meta.courses).forEach(function(c){if(c&&c.name)cn.push(c.name);});coursesStr=cn.join(", ");}

    var rawDate=tm.start_date||meta.start_date||t.date||"";
    var tInfo={key:tKey,name:t.name,year:t.year,date:rawDate,dateISO:dateSort(rawDate),courses:coursesStr,coursesShort:shortCourse(coursesStr),rounds:tm.rounds||meta.rounds||null,numPlayers:parseInt(tm.players_9||0)+parseInt(tm.players_18||0)||0,saLink:saLink,saT:saT,category:t.category||null,categories:[]};

    for(var fi=0;fi<fKeys.length;fi++){
      var fId=fKeys[fi],fl=flights[fId],fp=fl.flight_players||fl.players||{},catName=flightCats[fId]||"Unknown",gender=extractGender(catName);
      var hpr=null,catTee=null;var agVals=Object.values(ageGroups);
      for(var ai=0;ai<agVals.length;ai++){if(agVals[ai].name===catName){hpr=agVals[ai].holes_per_round;catTee=agVals[ai].tee_marker||null;break;}}
      if(!hpr){var ar=extractAgeRange(catName);var isG=/girl/i.test(catName);if(ar){hpr=isG?(ar.max<=10?9:18):(ar.max<=8?9:18);}else{hpr=18;}}

        if(detectedHoles.length>=2){var median=detectedHoles.sort(function(a,b){return a-b;})[Math.floor(detectedHoles.length/2)];if(median===9||median===18)hpr=median;}
      }
      var catApps=[],catPlayers=[];
      var pEntries=Object.entries(fp);
      for(var pi=0;pi<pEntries.length;pi++){
        var pid=pEntries[pi][0],pd=pEntries[pi][1];
        var first=(pd.first||"").trim(),last=(pd.last||"").trim(),name=(first+" "+last).trim();
        if(!name||name==="Unknown Player")continue;
        var country=(pd.country||"").toUpperCase(),place=(pd.place||"").trim();
        var teeName=(pd.teeMarkerName||"").trim();
        var rnds=[],totS=0;
        var rEntries=Object.entries(pd.rounds||{});
        for(var ri=0;ri<rEntries.length;ri++){var rn=rEntries[ri][0],rd=rEntries[ri][1];var strokes=(rd.strokes||[]).filter(function(s){return s>0;});var total=rd.num_strokes||strokes.reduce(function(a,b){return a+b;},0);rnds.push({round:parseInt(rn),total:total,strokes:strokes,holes:rd.num_holes||strokes.length});totS+=total;}
        rnds.sort(function(a,b){return a.round-b.round;});
        rnds=rnds.filter(function(r){return r.total>0;});
        var isWD=pd.status!==1||totS===0;
        var numR=rnds.length||1;
        var par=0;for(var rpi=0;rpi<rnds.length;rpi++){var rh=rnds[rpi].holes;var rPar=rh<=9?3:4;rnds[rpi].par=rh*rPar;par+=rh*rPar;}
        if(par===0)par=calcPar(hpr,numR);
        var vsPar=isWD?null:totS-par;
        var app={first:first,last:last,name:name,country:country,place:place,gender:gender,tournKey:tKey,tournament:t.name,year:t.year,date:tInfo.date,category:catName,hpr:hpr,par:par,numRounds:numR,course:coursesStr,saLink:saLink,totalStrokes:isWD?null:totS,vsPar:vsPar,status:isWD?"WD":"OK",rounds:rnds,pos:null,catTotal:0,teeName:teeName};
        catApps.push(app);allApps.push(app);

      }

      var pos=1;catPlayers.forEach(function(p,i){if(p.status!=="OK"){p.pos="WD";return;}p.pos=(i>0&&p.totalStrokes===catPlayers[i-1].totalStrokes)?catPlayers[i-1].pos:pos;pos=i+2;});

  /* MERGE PLAYERS */

  for(var ai2=0;ai2<allApps.length;ai2++){var app2=allApps[ai2];var k=app2.first.toLowerCase()+"|"+app2.last.toLowerCase()+"|"+app2.country.toLowerCase();if(!groups.has(k))groups.set(k,[]);groups.get(k).push(app2);}

  var lcGroups={};groups.forEach(function(apps,key){var pts=key.split("|");var lck=pts[1]+"|"+pts[2];if(!lcGroups[lck])lcGroups[lck]=[];lcGroups[lck].push({key:key,first:pts[0],last:pts[1],country:pts[2]});});
  Object.values(lcGroups).forEach(function(entries){
    if(entries.length<2)return;

    var lastWords=last.split(/\s+/).length;var isAnglo=["us","ca","gb","au"].indexOf(country)>=0;

      for(var j=i+1;j<entries.length;j++){

        }
      }

  });
  var players=[];var pidC=0;
  groups.forEach(function(apps){
    var persons=[];apps.sort(function(a,b){return a.year-b.year;});
    for(var i=0;i<apps.length;i++){var app3=apps[i];var merged=false;for(var j=0;j<persons.length;j++){if(canMerge(persons[j],app3)){persons[j].appearances.push(app3);if(persons[j].gender==="?"&&app3.gender!=="?")persons[j].gender=app3.gender;merged=true;break;}}if(!merged)persons.push({gender:app3.gender,appearances:[app3]});}
    for(var pi2=0;pi2<persons.length;pi2++){

      var bestVP=null,bestY=null,wins=0,podiums=0;
      if(okApps.length){var best=okApps.reduce(function(b,a){return a.vsPar<b.vsPar?a:b;});bestVP=best.vsPar;bestY=best.year;}
      p.appearances.forEach(function(a){if(a.pos===1)wins++;if(a.pos>=1&&a.pos<=3)podiums++;});
      var lastCat=p.appearances[p.appearances.length-1].category;

    }
  });
  players.sort(function(a,b){return b.numT-a.numT||a.name.localeCompare(b.name);});
  var yrs2=[],ySet={};src.forEach(function(t){if(t.year&&!ySet[t.year]){ySet[t.year]=1;yrs2.push(t.year);}});yrs2.sort();
  var cc={};players.forEach(function(p){var k=p.country.toUpperCase();if(k&&/^[A-Z]{2}$/.test(k))cc[k]=(cc[k]||0)+1;});
  var allCountries=Object.keys(cc).sort(function(a,b){return countryName(a).localeCompare(countryName(b));});
  var allPlayerCats={};players.forEach(function(p){var lc=p.lastCategory;if(lc)allPlayerCats[lc]=(allPlayerCats[lc]||0)+1;});
  console.timeEnd("processData");
  return{players:players,tournaments:tournIndex,years:yrs2,allCountries:allCountries,countryStats:cc,tournCats:allCats,playerCats:allPlayerCats};
}

/* ===== THEME ===== */
var T={bg:"#0a0f1a",card:"#141b2d",surface:"#f7f8fa",surfaceAlt:"#eef0f4",border:"#1e2a45",borderLight:"#e2e5eb",accent:"#22c55e",accentDark:"#15803d",accentSoft:"#dcfce7",gold:"#f59e0b",silver:"#94a3b8",bronze:"#d97706",text:"#e2e8f0",textMuted:"#64748b",textDark:"#1e293b",textBody:"#475569",blue:"#3b82f6",red:"#ef4444",pink:"#ec4899"};
function flag(c){if(!c||c.length!==2)return"";var u=c.toUpperCase();if(!/^[A-Z]{2}$/.test(u))return"";try{return String.fromCodePoint(0x1F1E6+u.charCodeAt(0)-65,0x1F1E6+u.charCodeAt(1)-65);}catch(e){return"";}}

/* ===== RANKINGS ===== */
function Rankings({data,onNavigate}){
  var _m=useState("country"),mode=_m[0],setMode=_m[1];

    if(mode==="veterans"){return data.players.slice().sort(function(a,b){return b.numT-a.numT;}).slice(0,limit).map(function(p,i){return{rank:i+1,key:p.id,id:p.id,label:p.name,fl:flag(p.country),country:p.country,numT:p.numT,wins:p.wins,years:p.years[0]+"\u2013"+p.years[p.years.length-1],bestScore:p.bestScore};});}
    if(mode==="scores"){return data.players.filter(function(p){return p.bestScore!=null;}).sort(function(a,b){return a.bestScore-b.bestScore;}).slice(0,limit).map(function(p,i){return{rank:i+1,key:p.id,id:p.id,label:p.name,fl:flag(p.country),country:p.country,bestScore:p.bestScore,bestYear:p.bestYear,numT:p.numT};});}
    if(mode==="tournament"){var tg={};data.tournaments.forEach(function(t){var bn=t.name.replace(/\s*\d{4}\s*/g," ").replace(/\s*\(.*?\)\s*/g,"").trim();if(!tg[bn])tg[bn]={name:bn,origNames:[],editions:[],playerCounts:[],categories:new Set()};tg[bn].origNames.push(t.name);tg[bn].editions.push(t.year);var np=t.categories.reduce(function(s,c){return s+c.players.length;},0);tg[bn].playerCounts.push(np);if(t.category)tg[bn].categories.add(t.category);});return Object.values(tg).sort(function(a,b){return b.editions.length-a.editions.length||b.playerCounts.reduce(function(s,v){return s+v;},0)-a.playerCounts.reduce(function(s,v){return s+v;},0);}).slice(0,limit).map(function(g,i){g.editions.sort();g.playerCounts.sort(function(a,b){return a-b;});var minP=g.playerCounts[0],maxP=g.playerCounts[g.playerCounts.length-1];var cats=Array.from(g.categories);return{rank:i+1,key:g.name,label:g.name,editions:g.editions.length,years:g.editions[0]+"\u2013"+g.editions[g.editions.length-1],playerRange:minP===maxP?(""+minP):(minP+"\u2013"+maxP),totalPlayers:g.playerCounts.reduce(function(s,v){return s+v;},0),cat:cats.length?cats.map(function(c){return catLabel(c);}).join(", "):"\u2013",searchName:g.name};});}
    if(mode==="series"){var sg={};data.tournaments.forEach(function(t){var sn=t.name.replace(/\s*\d{4}\s*/g," ").replace(/\s*\(.*?\)\s*/g,"").trim();if(!sg[sn])sg[sn]={name:sn,editions:[],players:0,categories:new Set()};sg[sn].editions.push(t.year);sg[sn].players+=t.categories.reduce(function(s,c){return s+c.players.length;},0);if(t.category)sg[sn].categories.add(t.category);});return Object.values(sg).filter(function(s){return s.editions.length>=2;}).sort(function(a,b){return b.editions.length-a.editions.length;}).slice(0,limit).map(function(s,i){s.editions.sort();var cats=Array.from(s.categories);return{rank:i+1,key:s.name,label:s.name,editions:s.editions.length,years:s.editions[0]+"\u2013"+s.editions[s.editions.length-1],players:s.players,cat:cats.length?cats.map(function(c){return catLabel(c);}).join(", "):"\u2013",searchName:s.name};});}
    return[];
  },[data,mode,limit]);
  return(
    <div style={{flex:1,overflowY:"auto",background:T.surface,padding:"28px 32px"}}>
      <div style={{maxWidth:960,margin:"0 auto"}}>
        <h1 style={{margin:"0 0 6px",fontSize:28,fontWeight:900,color:T.textDark,fontFamily:F}}>Rankings</h1>

              </div>
            </button>);})}
            {filteredPlayers.length>500&&<div style={{padding:14,textAlign:"center",fontSize:12,color:T.textMuted}}>{"A mostrar 500 de "+filteredPlayers.length}</div>}
          </div>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:T.surface}}>{selPlayerData?<PDetail key={selPlayerData.id} player={selPlayerData} onTournClick={goToTourn}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,color:T.textMuted,fontSize:15}}>Seleciona um jogador</div>}</div>
      </React.Fragment>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
