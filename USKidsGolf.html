function extractAgeRange(category){if(!category)return null;var c=category.replace(/\s+/g," ").trim();var underM=c.match(/(\d+)\s*[&]?\s*Under/i);if(underM)return{min:5,max:parseInt(underM[1])};var rangeM=c.match(/(\d+)\s*-\s*(\d+)/);if(rangeM)return{min:parseInt(rangeM[1]),max:parseInt(rangeM[2])};var singleM=c.match(/\b(\d{1,2})\b/);if(singleM){var age=parseInt(singleM[1]);if(age>=5&&age<=18)return{min:age,max:age};}return null;}

function calcPar(hpr,numRounds){return hpr*4*numRounds;}

function processData(raw){

    var tInfo={key:tKey,name:t.name,year:t.year,date:meta.start_date||t.date||"",endDate:meta.end_date||"",courses:meta.courses||"",rounds:meta.rounds||null,numPlayers:t.num_players||0,iframeUrl:t.iframe_url||null,tournamentId:t.tournament_id||null,categories:[]};
    var fKeys=Object.keys(flights);fKeys.sort(function(a,b){var na=parseInt(a),nb=parseInt(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b);});

      var hpr=null;var agVals=Object.values(ageGroups);for(var ai=0;ai<agVals.length;ai++){if(agVals[ai].name===catName){hpr=agVals[ai].holes_per_round;break;}}

      var catApps=[],catPlayers=[];
      var pEntries=Object.entries(fp);

        var pid=pEntries[pi][0],pd=pEntries[pi][1];
        var first=(pd.first||"").trim(),last=(pd.last||"").trim(),name=(first+" "+last).trim();
        if(!name||name==="Unknown Player")continue;

        var app={first:first,last:last,name:name,country:country,place:place,gender:gender,tournKey:tKey,tournament:t.name,year:t.year,date:meta.start_date||t.date||"",category:catName,hpr:hpr,par:par,course:meta.courses||"",iframeUrl:t.iframe_url||null,totalStrokes:isWD?null:totStrokes,vsPar:vsPar,score:vsPar,status:isWD?"WD":"OK",rounds:rnds,pos:null,catTotal:0};
        catApps.push(app);allApps.push(app);

      for(var ci2=0;ci2<catPlayers.length;ci2++){var cp=catPlayers[ci2];var match=catApps.find(function(a){return a.name===cp.name&&a.country===cp.country;});if(match){match.pos=cp.pos;match.catTotal=catTotal;}}

      for(var ai3=0;ai3<p.appearances.length;ai3++){if(p.appearances[ai3].place&&p.appearances[ai3].place.length>bestPlace.length)bestPlace=p.appearances[ai3].place;}
      p.appearances.sort(function(a,b){return a.year-b.year||(a.date||"").localeCompare(b.date||"");});
      var catsSet={},yrsSet={},tNamesSet={};p.appearances.forEach(function(a){catsSet[a.category]=1;yrsSet[a.year]=1;tNamesSet[a.tournament]=1;});
      var cats=Object.keys(catsSet),yrs=Object.keys(yrsSet).map(Number).sort(),tNames=Object.keys(tNamesSet);
      var okApps=p.appearances.filter(function(a){return a.status==="OK"&&a.vsPar!=null;});
      var bestVsPar=null,bestYear=null;
      if(okApps.length){var best=okApps.reduce(function(b,a){return a.vsPar<b.vsPar?a:b;});bestVsPar=best.vsPar;bestYear=best.year;}
      players.push({id:pidC++,name:a0.name,country:a0.country,place:bestPlace,gender:p.gender,birth:estimateBirth(p.appearances),appearances:p.appearances,categories:cats,years:yrs,tournNames:tNames,numT:tNames.length,bestScore:bestVsPar,bestYear:bestYear});
    }

  var yrs2=[],ySet={};srcTournaments.forEach(function(t){if(!ySet[t.year]){ySet[t.year]=1;yrs2.push(t.year);}});yrs2.sort();
  var cc={};players.forEach(function(p){var k=p.country.toUpperCase();cc[k]=(cc[k]||0)+1;});

  var topC=Object.entries(cc).sort(function(a,b){return b[1]-a[1];}).map(function(e){return e[0];});

function Dashboard({data,onNavigate}){
  var stats=useMemo(function(){
    var tournByYear={},playersByYear={};

    data.players.forEach(function(p){p.years.forEach(function(y){if(!playersByYear[y])playersByYear[y]=new Set();playersByYear[y].add(p.id);});});
    var yearData=data.years.map(function(y){return{year:y,tournaments:(tournByYear[y]||[]).length,players:(playersByYear[y]||new Set()).size};});
    var topCountries=Object.entries(data.countryStats).sort(function(a,b){return b[1]-a[1];}).slice(0,12).map(function(e){return{country:e[0],fl:flag(e[0]),name:countryName(e[0]),count:e[1]};});

  var _st=useState(null),selTourn=_st[0],setSelTourn=_st[1];
  var _sp=useState(null),selPlayer=_sp[0],setSelPlayer=_sp[1];
  var _se=useState(""),search=_se[0],setSearch=_se[1];
  var _cf=useState("all"),countryF=_cf[0],setCountryF=_cf[1];
  var _gf=useState("all"),genderF=_gf[0],setGenderF=_gf[1];
  var _sb=useState("tournaments"),sortBy=_sb[0],setSortBy=_sb[1];
  var _ts=useState(""),tSearch=_ts[0],setTSearch=_ts[1];
  var _ty=useState("all"),tYearF=_ty[0],setTYearF=_ty[1];
  var fileRef=useRef(null);

  var handleFile=useCallback(function(e){
    var files=e.target.files;if(!files||files.length===0)return;
    setLoading(true);setError(null);setStatus("A ler "+files.length+" ficheiro(s)...");
    var promises=[];
    for(var i=0;i<files.length;i++){promises.push(files[i].text());}
    Promise.all(promises).then(function(texts){
      setStatus("A processar JSON...");
      setTimeout(function(){
        try{
          var allTournaments=[];
          for(var i=0;i<texts.length;i++){
            var raw=JSON.parse(texts[i]);
            raw=adaptFormat(raw);
            var ts=raw.tournaments||[];
            allTournaments=allTournaments.concat(ts);
          }
          var merged={tournaments:allTournaments};
          setStatus("A indexar "+allTournaments.length+" torneios...");
          setTimeout(function(){var result=processData(merged);setData(result);setSelTourn(null);setSelPlayer(null);setView("dashboard");setLoading(false);setStatus("");},50);
        }catch(err){setError("Erro: "+err.message);setLoading(false);setStatus("");}
      },50);
    });
  },[]);

  var filteredTourns=useMemo(function(){if(!data)return[];var list=data.tournaments;if(tYearF!=="all")list=list.filter(function(t){return t.year===parseInt(tYearF);});if(tSearch){var q=tSearch.toLowerCase();list=list.filter(function(t){return t.name.toLowerCase().indexOf(q)>=0;});}return list.sort(function(a,b){return b.year-a.year||a.name.localeCompare(b.name);});},[data,tYearF,tSearch]);

  var filteredPlayers=useMemo(function(){if(!data)return[];var list=data.players;if(search){var q=search.toLowerCase();list=list.filter(function(p){return p.name.toLowerCase().indexOf(q)>=0||p.place.toLowerCase().indexOf(q)>=0||countryName(p.country).toLowerCase().indexOf(q)>=0||p.country.toLowerCase().indexOf(q)>=0;});}if(countryF!=="all")list=list.filter(function(p){return p.country===countryF;});if(genderF!=="all")list=list.filter(function(p){return p.gender===genderF;});if(sortBy==="name")return list.slice().sort(function(a,b){return a.name.localeCompare(b.name);});if(sortBy==="country")return list.slice().sort(function(a,b){return countryName(a.country).localeCompare(countryName(b.country));});if(sortBy==="recent")return list.slice().sort(function(a,b){return b.years[b.years.length-1]-a.years[a.years.length-1];});return list;},[data,search,countryF,genderF,sortBy]);

  var findPlayer=useCallback(function(name,country,gender){if(!data)return;var p=data.players.find(function(pl){return pl.name===name&&pl.country.toLowerCase()===country.toLowerCase()&&pl.gender===gender;});if(p){setSelPlayer(p.id);setView("players");setSearch("");setCountryF("all");setGenderF("all");}},[data]);
  var goToTourn=useCallback(function(tKey){setSelTourn(tKey);setView("tournaments");},[]);
  var navigate=useCallback(function(v,id){setView(v);if(v==="players"&&id!=null)setSelPlayer(id);},[]);

  var selTournData=useMemo(function(){return data&&data.tournaments.find(function(t){return t.key===selTourn;});},[data,selTourn]);
  var selPlayerData=useMemo(function(){return data&&data.players.find(function(p){return p.id===selPlayer;});},[data,selPlayer]);

  if(!data)return(
    <React.Fragment><link href={FL} rel="stylesheet"/>
    <div style={{fontFamily:F,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg, "+T.bg+" 0%, #0d2137 40%, #0a3026 100%)",color:"#fff",padding:24}}>
      <div style={{textAlign:"center",maxWidth:480}}>
        <div style={{width:80,height:80,borderRadius:24,background:"linear-gradient(135deg, "+T.accent+", #16a34a)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:38,marginBottom:16,boxShadow:"0 8px 32px "+T.accent+"30"}}>{"\u26f3"}</div>
        <h1 style={{fontSize:32,fontWeight:900,margin:"0 0 4px",letterSpacing:-0.5}}>USKids Golf</h1>
        <p style={{fontSize:14,color:T.textMuted,margin:"0 0 32px"}}>Analytics \u00b7 Torneios \u00b7 Jogadores \u00b7 Scorecards</p>
        {error&&<div style={{background:"#7f1d1d90",color:"#fca5a5",padding:"12px 18px",borderRadius:12,marginBottom:16,fontSize:12,border:"1px solid #991b1b"}}>{error}</div>}
        {status&&<div style={{color:T.accent,fontSize:13,marginBottom:12,fontWeight:500}}>{status}</div>}
        <button onClick={function(){fileRef.current&&fileRef.current.click();}} disabled={loading} style={{background:loading?"#475569":"linear-gradient(135deg, "+T.accent+", #16a34a)",color:"#fff",border:"none",padding:"16px 36px",borderRadius:14,fontSize:15,fontWeight:700,cursor:loading?"wait":"pointer",boxShadow:"0 4px 24px "+T.accent+"40",fontFamily:F}}>{loading?"A processar...":"Carregar JSON(s)"}</button>
        <input ref={fileRef} type="file" accept=".json" multiple onChange={handleFile} style={{display:"none"}}/>
        <p style={{fontSize:11,color:"#4a6070",marginTop:16}}>Seleciona um ou mais ficheiros (ex: uskids_complete_v2.json + uskids_americanos.json)</p>
      </div>
    </div></React.Fragment>
  );

  var navItems=[{key:"dashboard",icon:"\ud83d\udcca",label:"Dashboard"},{key:"tournaments",icon:"\ud83c\udfc6",label:"Torneios"},{key:"players",icon:"\ud83d\udc64",label:"Jogadores"},{key:"rankings",icon:"\ud83e\udd47",label:"Rankings"}];

  return(<React.Fragment><link href={FL} rel="stylesheet"/><div style={{fontFamily:F,height:"100vh",display:"flex",background:T.surface}}>
    <div style={{width:64,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 0",flexShrink:0,gap:2}}>
      <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg, "+T.accent+", #16a34a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,marginBottom:16,boxShadow:"0 2px 12px "+T.accent+"30"}}>{"\u26f3"}</div>
      {navItems.map(function(n){return(<button key={n.key} onClick={function(){setView(n.key);}} style={{width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,background:view===n.key?T.card:"transparent",color:view===n.key?T.accent:T.textMuted,fontSize:16}} title={n.label}><span>{n.icon}</span><span style={{fontSize:8,fontWeight:700,letterSpacing:0.5}}>{n.label.substring(0,4)}</span></button>);})}
      <div style={{flex:1}}/>
      <button onClick={function(){setData(null);}} style={{width:38,height:38,borderRadius:10,border:"none",cursor:"pointer",background:"transparent",color:T.textMuted,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}} title="Fechar">&times;</button>
    </div>
    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      {view==="dashboard"&&<Dashboard data={data} onNavigate={navigate}/>}
      {view==="tournaments"&&<React.Fragment>
        <div style={{width:320,minWidth:260,borderRight:"1px solid "+T.borderLight,display:"flex",flexDirection:"column",flexShrink:0,background:"#fff"}}>
          <div style={{padding:"12px 12px 8px",borderBottom:"1px solid "+T.borderLight}}>
            <input value={tSearch} onChange={function(e){setTSearch(e.target.value);}} placeholder="Pesquisar torneio..." style={inpS}/>
            <div style={{display:"flex",gap:3,marginTop:8,flexWrap:"wrap"}}>
              <button onClick={function(){setTYearF("all");}} style={Object.assign({},pillSm,{background:tYearF==="all"?T.accent:T.surfaceAlt,color:tYearF==="all"?"#fff":T.textMuted,border:"none",cursor:"pointer",fontFamily:F})}>Todos</button>
              {data.years.slice().reverse().slice(0,14).map(function(y){return<button key={y} onClick={function(){setTYearF(String(y));}} style={Object.assign({},pillSm,{background:tYearF===String(y)?T.accent:T.surfaceAlt,color:tYearF===String(y)?"#fff":T.textMuted,border:"none",cursor:"pointer",fontFamily:F})}>{y}</button>;})}
            </div>
            <div style={{fontSize:10,color:T.textMuted,marginTop:6,fontWeight:600}}>{filteredTourns.length} torneios</div>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>{filteredTourns.map(function(t){return(<button key={t.key} onClick={function(){setSelTourn(t.key);}} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 14px",border:"none",borderBottom:"1px solid "+T.surfaceAlt,cursor:"pointer",background:selTourn===t.key?T.accentSoft:"transparent",borderLeft:selTourn===t.key?"3px solid "+T.accent:"3px solid transparent",fontFamily:F}}><div style={{fontWeight:700,fontSize:12,color:T.textDark}}>{t.name}</div><div style={{fontSize:10,color:T.textMuted,marginTop:3}}>{t.date} \u00b7 {t.categories.length} cats \u00b7 {t.categories.reduce(function(s,c){return s+c.players.length;},0)} jog</div></button>);})}</div>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:T.surface}}>{selTournData?<TournDetail key={selTournData.key} tourn={selTournData} onPlayerClick={findPlayer}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,color:T.textMuted,fontSize:14}}>Seleciona um torneio</div>}</div>
      </React.Fragment>}
      {view==="players"&&<React.Fragment>
        <div style={{width:320,minWidth:260,borderRight:"1px solid "+T.borderLight,display:"flex",flexDirection:"column",flexShrink:0,background:"#fff"}}>
          <div style={{padding:"12px 12px 8px",borderBottom:"1px solid "+T.borderLight}}>
            <input value={search} onChange={function(e){setSearch(e.target.value);setSelPlayer(null);}} placeholder="Pesquisar jogador ou pa\u00eds..." style={inpS}/>
            <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
              <select value={countryF} onChange={function(e){setCountryF(e.target.value);setSelPlayer(null);}} style={Object.assign({},inpS,{width:"auto",padding:"5px 8px",fontSize:11,maxWidth:180})}><option value="all">Todos os pa\u00edses ({data.allCountries.length})</option>{data.allCountries.map(function(c){return<option key={c} value={c}>{flag(c)} {countryName(c)} ({data.countryStats[c]})</option>;})}</select>
              <select value={genderF} onChange={function(e){setGenderF(e.target.value);setSelPlayer(null);}} style={Object.assign({},inpS,{width:"auto",padding:"5px 8px",fontSize:11})}><option value="all">Todos</option><option value="M">Boys</option><option value="F">Girls</option></select>
              <select value={sortBy} onChange={function(e){setSortBy(e.target.value);}} style={Object.assign({},inpS,{width:"auto",padding:"5px 8px",fontSize:11})}><option value="tournaments">+Torneios</option><option value="name">A-Z</option><option value="country">Pa\u00eds</option><option value="recent">Recente</option></select>
            </div>
            <div style={{fontSize:10,color:T.textMuted,marginTop:6,fontWeight:600}}>{filteredPlayers.length} jogadores</div>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            {filteredPlayers.slice(0,500).map(function(p){return(<button key={p.id} onClick={function(){setSelPlayer(p.id);}} style={{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",border:"none",borderBottom:"1px solid "+T.surfaceAlt,cursor:"pointer",background:selPlayer===p.id?T.accentSoft:"transparent",borderLeft:selPlayer===p.id?"3px solid "+T.accent:"3px solid transparent",fontFamily:F}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{flag(p.country)||p.country}</span><span style={{fontWeight:700,fontSize:12,color:T.textDark}}>{p.name}</span>{p.gender==="F"&&<span style={Object.assign({},pillSm,{background:"#fce7f3",color:"#9d174d"})}>{"\u2640"}</span>}<span style={Object.assign({},pillSm,{background:T.accentSoft,color:T.accentDark,marginLeft:"auto"})}>{p.numT}T</span></div><div style={{fontSize:10,color:T.textMuted,marginTop:3,display:"flex",gap:6,flexWrap:"wrap"}}>{p.birth&&<span style={{color:"#7c3aed",fontWeight:600}}>~{p.birth}</span>}<span>{p.years[0]}\u2013{p.years[p.years.length-1]}</span>{p.place&&<span>{p.place}</span>}</div></button>);})}
            {filteredPlayers.length>500&&<div style={{padding:14,textAlign:"center",fontSize:11,color:T.textMuted}}>A mostrar 500 de {filteredPlayers.length}</div>}
          </div>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:T.surface}}>{selPlayerData?<PDetail key={selPlayerData.id} player={selPlayerData} onTournClick={goToTourn}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",flex:1,color:T.textMuted,fontSize:14}}>Seleciona um jogador</div>}</div>
      </React.Fragment>}
    </div>
  </div></React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
